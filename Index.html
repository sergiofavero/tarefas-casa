<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina da Casa</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system;
    background: #f0f2f5;
}

.header {
    background: #1c1c1c;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
}

.sub {
    text-align: center;
    padding: 10px;
    font-size: 14px;
    color: #555;
}

.container {
    padding: 12px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.title {
    font-weight: bold;
    margin-bottom: 10px;
}

.sergio-title {
    color: #2d8cff;
}

.mari-title {
    color: #ff5c8a;
}

.task {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
}

.sergio {
    background: #dbeeff;
}

.mari {
    background: #ffdbe6;
}

.nav {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
}

.prev { background: #ddd; }
.next { background: #ddd; }

</style>
</head>

<body>

<div class="header">Rotina do Dia</div>
<div class="sub" id="info"></div>

<div class="container">

<div class="nav">
    <button class="prev" onclick="mudarDia(-1)">◀</button>
    <button class="next" onclick="mudarDia(1)">▶</button>
</div>

<div class="card">
    <div class="title sergio-title">Sergio</div>
    <div id="sergio"></div>
</div>

<div class="card">
    <div class="title mari-title">Mari</div>
    <div id="mari"></div>
</div>

</div>

<script>

// ===== CONFIGURAÇÃO =====

const tarefas = {
    semana1: {
        Seg: {
            sergio: ["Cozinhar", "Manter mesa", "Escovar dentes Duda"],
            mari: ["Dar janta Duda", "Tirar lixo"]
        },
        Ter: {
            sergio: ["Varrer chão"],
            mari: ["Organizar brinquedos"]
        },
        Qua: {
            sergio: ["Lavar roupas"],
            mari: ["Estender roupas"]
        },
        Qui: {
            sergio: ["Verificar Guga"],
            mari: ["Organizar banheiro"]
        },
        Sex: {
            sergio: ["Organizar geladeira"],
            mari: ["Arrumar cama"]
        },
        Sab: {
            sergio: ["Manter potes"],
            mari: ["Dobrar roupas"]
        },
        Dom: {
            sergio: [],
            mari: ["Recolher coisas na rua"]
        }
    },

    semana2: {}
};

// inverter automaticamente semana2
Object.keys(tarefas.semana1).forEach(dia => {
    tarefas.semana2[dia] = {
        sergio: tarefas.semana1[dia].mari,
        mari: tarefas.semana1[dia].sergio
    };
});

// ===== DATA =====

let dataAtual = new Date();

function getSemana() {
    let inicio = new Date(2024, 0, 1);
    let diff = Math.floor((dataAtual - inicio) / (1000 * 60 * 60 * 24));
    let semana = Math.floor(diff / 7);
    return semana % 2 === 0 ? 1 : 2;
}

function getDiaNome() {
    return ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"][dataAtual.getDay()];
}

// ===== RENDER =====

function render() {

    let semana = getSemana();
    let dia = getDiaNome();

    document.getElementById("info").innerHTML =
        `Dia: <b>${dia}</b> | Semana: <b>${semana}</b>`;

    let base = semana === 1 ? tarefas.semana1 : tarefas.semana2;

    let s = base[dia].sergio;
    let m = base[dia].mari;

    document.getElementById("sergio").innerHTML =
        s.map(t => `<div class="task sergio">${t}</div>`).join("");

    document.getElementById("mari").innerHTML =
        m.map(t => `<div class="task mari">${t}</div>`).join("");
}

function mudarDia(n) {
    dataAtual.setDate(dataAtual.getDate() + n);
    render();
}

render();

</script>

</body>
</html>
